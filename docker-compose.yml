# MariaDB + FastAPI backend. Frontend (Vite) is added in a later slice.
# podman-compose compatible.

services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: ${DB_NAME:-wearable_hub}
      MARIADB_USER: ${DB_USER:-wearable}
      MARIADB_PASSWORD: ${DB_PASSWORD:-wearable}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpw}
    ports:
      # Host 3306 is taken by a native MariaDB; expose on 3307 for host-side inspection.
      # The backend talks to `db:3306` over the internal compose network regardless.
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://${DB_USER:-wearable}:${DB_PASSWORD:-wearable}@db:3306/${DB_NAME:-wearable_hub}
    ports:
      # Host 8000 is reserved by nginx for /qualtrics_dashboard/; use 8010.
      # nginx proxies the public paths (/enroll, /webhooks) here.
      - "8010:8000"
    volumes:
      # Service-account key for Tier-1 subscriber registration (read-only).
      # GH_SA_CREDENTIALS_FILE points at /secrets/health-sa.json inside the container.
      # `z` relabels for SELinux (el8/podman) so the container can read the mount.
      - ./secrets:/secrets:ro,z
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    # Daily-consolidation backstop: nightly safety-net + periodic dirty-queue drain.
    # Same image as backend; overrides the serve command. Migrations are owned by `backend`.
    build: ./backend
    command: ["python", "-m", "app.scheduler"]
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://${DB_USER:-wearable}:${DB_PASSWORD:-wearable}@db:3306/${DB_NAME:-wearable_hub}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    # Researcher console (Vite/React) served by nginx, which also reverse-proxies /admin and
    # /enroll to the backend (same-origin, no CORS). Access at http://<host>:8020.
    build: ./frontend
    ports:
      - "8020:80"
    depends_on:
      - backend

volumes:
  db_data:
