# FastAPI backend + scheduler + frontend (Vite/nginx).
# DB is an external MariaDB at cnc3.med.umn.edu — DATABASE_URL is set in .env.
# podman-compose compatible.

services:
  backend:
    build: ./backend
    # All settings load from .env (Google + Garmin OAuth, DB, webhook secret, …). Garmin needs
    # GARMIN_CONSUMER_KEY/SECRET + GARMIN_OAUTH_REDIRECT_URI set; the per-datatype Garmin push URLs
    # (/webhooks/garmin/{dailies,sleeps,…}) are reverse-proxied here just like /enroll & /webhooks.
    env_file:
      - .env
    ports:
      # Host 8000 is reserved by nginx for /qualtrics_dashboard/; use 8010.
      # nginx proxies the public paths (/enroll, /webhooks) here.
      - "8010:8000"
    volumes:
      # Service-account key for Tier-1 subscriber registration (read-only).
      # GH_SA_CREDENTIALS_FILE points at /secrets/health-sa.json inside the container.
      # `z` relabels for SELinux (el8/podman) so the container can read the mount.
      - ./secrets:/secrets:ro,z

  scheduler:
    # Daily-consolidation backstop: nightly safety-net + periodic dirty-queue drain.
    # Same image as backend; overrides the serve command. Migrations are owned by `backend`.
    build: ./backend
    command: ["python", "-m", "app.scheduler"]
    env_file:
      - .env

  frontend:
    # Researcher console (Vite/React) served by nginx, which also reverse-proxies /admin and
    # /enroll to the backend (same-origin, no CORS). Access at http://<host>:8020.
    build: ./frontend
    ports:
      - "8020:80"
    depends_on:
      - backend
