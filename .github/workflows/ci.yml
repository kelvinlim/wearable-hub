name: CI

# Fast, dependency-light checks on every PR (and pushes to main): the three version
# declarations stay in sync, backend Python parses, and the frontend builds.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Versions in sync (pyproject / config.py / package.json)
        run: scripts/bump-version.sh --check

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile-check backend (syntax)
        run: python -m py_compile $(git ls-files 'backend/**/*.py')

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
