# Host nginx location blocks for wearable-hub on lnpitask.umn.edu
# ---------------------------------------------------------------------------
# This is the HOST nginx (the lnpitask reverse proxy in front of the Podman
# containers) — NOT the frontend container's internal nginx (that one lives at
# frontend/nginx.conf). The host config file itself lives outside this repo
# (typically /etc/nginx/conf.d/ or a vhost include on lnpitask); this file is
# the version-controlled source of truth for the wearable-hub location blocks.
#
# Merge these `location` blocks into the existing lnpitask `server { ... }`
# block that already terminates TLS for lnpitask.umn.edu. Do NOT add a second
# server block / listen / server_name / ssl_certificate — those stay in the
# host's existing vhost.
#
# Upstreams (host-published ports, see docker-compose.yml / quadlet units):
#   backend  -> 127.0.0.1:8010
#   frontend -> 127.0.0.1:8020   (console SPA; /wearable/ prefix is stripped)
#
# After editing the live host config: `sudo nginx -t && sudo nginx -s reload`.
# ---------------------------------------------------------------------------

# --- Public pages required for Google OAuth verification (NEW) --------------
# Homepage  -> consent screen "Home Page URL"      https://lnpitask.umn.edu/
# Privacy   -> consent screen "Privacy Policy URL"  https://lnpitask.umn.edu/privacy
# Exact-match (`= `) so they only catch the bare paths and never shadow
# /enroll, /webhooks, or /wearable/ below.
location = / {
    proxy_pass http://127.0.0.1:8010/;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
}
location = /privacy {
    proxy_pass http://127.0.0.1:8010/privacy;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
}

# --- Live Google routes at root (kept for the verified Google OAuth app) -----
# These stay at root because the Google Cloud Console redirect URI and the
# registered webhook URL already point here. Migrate them under /wearable/ later
# by adding the /wearable redirect URI in Cloud Console + re-registering the
# subscriber; until then, do NOT move these.
#
# Subject enrollment + Google OAuth callback.
location /enroll {
    proxy_pass http://127.0.0.1:8010;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
}

# Google Health webhook callbacks.
location /webhooks/google-health {
    proxy_pass http://127.0.0.1:8010;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
}

# --- Namespaced backend endpoints under /wearable/ (consistency + no root ----
# collisions). These are MORE SPECIFIC than `location /wearable/` below, so
# nginx longest-prefix matching routes them here (straight to the backend,
# bypassing the SPA container) before falling through to the SPA. The trailing
# proxy_pass URI strips the /wearable prefix:
#   /wearable/webhooks/garmin/dailies -> backend /webhooks/garmin/dailies
#   /wearable/enroll/callback         -> backend /enroll/callback
# Set PUBLIC_PATH_PREFIX=/wearable in .env so the enroll page's own links/redirects
# stay inside the prefix. Register the Garmin push + callback URLs under /wearable/.
location /wearable/webhooks/ {
    proxy_pass http://127.0.0.1:8010/webhooks/;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
}
location /wearable/enroll {
    proxy_pass http://127.0.0.1:8010/enroll;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
}

# Researcher console (React SPA). Strip the /wearable/ prefix so the frontend
# container sees "/". Its internal nginx serves the SPA and proxies /admin,
# /auth, /enroll, /health to the backend. (Least specific /wearable/ match.)
location /wearable/ {
    proxy_pass http://127.0.0.1:8020/;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
}
