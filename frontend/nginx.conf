server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy the backend API so the SPA is same-origin (no CORS).
    # `backend` is the compose service name; it listens on 8000 inside the network.
    location /admin/ { proxy_pass http://backend:8000; proxy_set_header Host $host; }
    location /enroll { proxy_pass http://backend:8000; proxy_set_header Host $host; }
    location /webhooks { proxy_pass http://backend:8000; proxy_set_header Host $host; }
    location /health { proxy_pass http://backend:8000; proxy_set_header Host $host; }

    # SPA fallback (no client-side router today, but keeps deep links working).
    location / { try_files $uri $uri/ /index.html; }
}
