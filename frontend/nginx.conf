server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve `backend` per request so the proxy survives backend container restarts
    # (each restart gives the backend a new IP on the user-defined network). The resolver
    # IP is injected at container start by /docker-entrypoint.d/30-set-resolver.sh.
    resolver __DNS_RESOLVER__ valid=10s ipv6=off;

    # Reverse-proxy the backend API so the SPA is same-origin (no CORS).
    # `backend` is the compose service name / quadlet NetworkAlias; it listens on 8000.
    # A variable in proxy_pass forces nginx to use the resolver above instead of caching
    # the address at config-parse time.
    set $backend_upstream "backend:8000";
    # 5-min read timeout on /admin/: on-demand consolidate iterates day-by-day through Google
    # Health API calls via the corp proxy; default 60s easily 504s. Other locations stay quick.
    location /admin/ {
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    location /auth { proxy_pass http://$backend_upstream; proxy_set_header Host $host; }
    location /enroll { proxy_pass http://$backend_upstream; proxy_set_header Host $host; }
    location /webhooks { proxy_pass http://$backend_upstream; proxy_set_header Host $host; }
    location /health { proxy_pass http://$backend_upstream; proxy_set_header Host $host; }

    # SPA fallback (no client-side router today, but keeps deep links working).
    location / { try_files $uri $uri/ /index.html; }
}
